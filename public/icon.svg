  <!-- Trend Line -->
  <path d="M 150 280 Q 210 240 270 260 T 370 210" stroke="#10B981" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Data Points on Trend Line -->
